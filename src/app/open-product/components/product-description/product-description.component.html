<div class="main__left__description__title">
  <div class="main__left__description__sub-title">
    <div class="main__left__description__sub-div">
      <span class="main__left__description__sub-title__price">{{productData.price}}$</span>
    </div>
    <div class="main__left__description__sub-div">
      <span class="main__left__description__sub-title__text">{{productDescription[0].SKU}}</span>
      <p class="main__left__description__sub-title__code">Šifra artikla</p>
    </div>
  </div>
</div>

<div class="main__left__description__info">
  <p class="main__left__description__info__text">Šifra artikla: {{productDescription[0].SKU}}</p>

  <p *ngFor="let item of description" class="main__left__description__info__text">{{ item }}</p>
</div>


  <div class="main__left__description__social">
    <p class="main__left__description__text">Količina: </p>
    <input class="main__left__description__input" type="text" id="quantity" value="1" readonly>
    <button class="main__left__description__button">-</button>
    <button class="main__left__description__button">+</button>
    <span class="main__left__description__plus">+</span>
    <p class="main__left__description__text">Share:</p>
    <a href="" class="main__left__description__link"><i class="fa-brands fa-facebook-f main__left__description__icon"></i></a>
    <a href="" class="main__left__description__link"><i class="fa-brands fa-twitter main__left__description__icon"></i></a>
    <a href="" class="main__left__description__link"><i class="fa-regular fa-envelope main__left__description__icon"></i></a>
    <a href="" class="main__left__description__link"><i class="fa-brands fa-google-plus-g main__left__description__icon"></i></a>
  </div>
  <div>
    <button class="main__left__button"><i class="fa-solid fa-cart-shopping main__left__button__icon"></i>Dodaj u korpu</button>
    <button class="main__left__button">Provjeri korpu</button>
  </div>
