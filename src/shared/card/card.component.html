<div class="container__products__bar__card" [routerLink]="['/product', product.id]" >

    <div class="container__products__bar__img-wrapper">
        <img *ngIf="product.picture" [src]="product.picture[0].url" alt="" class="container__products__bar__img">
        <div class="container__products__bar__badge" *ngIf="product.discount">{{product.discount}}%</div>
    </div>
    <h5 class="container__products__bar__name">{{product.name}}</h5>

    <span class="container__products__bar__timer">10d 6h 15m 10s</span>


    <div class="bar__price">
  <span *ngIf="product.discount" class="container__products__bar__price bar__price--old">
{{ product.price | number:'1.2-2' }} $
  </span>

        <span class="container__products__bar__price bar__price--new">
{{ (product.discount > 0 ? (product.price * (1 - product.discount / 100)) : product.price) | number:'1.2-2' }}$
  </span>
    </div>

</div>
